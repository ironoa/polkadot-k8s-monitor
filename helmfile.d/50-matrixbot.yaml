environments:
  production:
  local:
---
repositories:
- name: w3f
  url: https://w3f.github.io/helm-charts/

releases:
- name: matrixbot
  namespace: monitoring
  chart: w3f/matrixbot
  version: ^v2.0.0
  values:
  - ./config/matrixbot-values.yaml.gotmpl

- name: kusama-validator-watcher-matrixbot
  namespace: kusama
  chart: w3f/matrixbot
  version: ^v2.0.0
  values:
  - ./config/matrixbot-values.yaml.gotmpl  
  - ./config/kusama/validator-matrixbot-values.yaml.gotmpl

# polkadot matrixbot removed 2026-07: no Polkadot validator active (only 1 Kusama node)
