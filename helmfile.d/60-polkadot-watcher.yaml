    namespace: kusama
    chart: w3f/polkadot-watcher
    version: ^v4.1.2
    values:
      - ./config/watcher.yaml.gotmpl
      - ./config/kusama/validator-watcher-values.yaml.gotmpl
  # polkadot watcher removed 2026-07: no Polkadot validator active (only 1 Kusama node)
